version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: pulseboard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: pulseboard
      MONGO_INITDB_ROOT_PASSWORD: pulsehex
      MONGO_INITDB_DATABASE: pulseboard
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
